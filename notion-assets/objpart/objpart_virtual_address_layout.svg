  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <text x="80" y="62" class="title">ObjPart의 mmap 기반 virtual address layout</text>
  <text x="80" y="94" class="subtitle">category는 단순 label이 아니라 실제 address-space subrange이며, configured span은 곧바로 runtime residency를 뜻하지 않는다.</text>
  <g>
    <rect x="60" y="122" width="1480" height="250" rx="24" fill="#FAFBFC" stroke="#E5E7EB" stroke-width="2"/>
    <text x="88" y="164" class="panel-title">A. category별 가상 주소 구간</text>
    <text x="88" y="194" class="panel-subtitle">ObjPart는 큰 mmap 기반 VA space를 먼저 예약하고, 그 안을 category subrange로 나눈다.</text>
  </g>
