<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect x="0" y="0" width="1920" height="1080" fill="#ffffff"/>
  <style>
    .title { font-family: 'Noto Sans CJK KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif; font-size: 34px; font-weight: 700; fill: #222222; }
    .subtitle { font-family: 'Noto Sans CJK KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif; font-size: 18px; font-weight: 500; fill: #5b6470; }
    .section { font-family: 'Noto Sans CJK KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif; font-size: 24px; font-weight: 700; fill: #222222; }
    .boxhead { font-family: 'Noto Sans CJK KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif; font-size: 20px; font-weight: 700; fill: #222222; }
    .body { font-family: 'Noto Sans CJK KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif; font-size: 16px; font-weight: 500; fill: #222222; }
    .small { font-family: 'Noto Sans CJK KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif; font-size: 13px; font-weight: 500; fill: #222222; }
    .tiny { font-family: 'Noto Sans CJK KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif; font-size: 11px; font-weight: 500; fill: #5b6470; }
    .label { font-family: 'Noto Sans CJK KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif; font-size: 17px; font-weight: 700; fill: #222222; }
    .caption { font-family: 'Noto Sans CJK KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif; font-size: 17px; font-weight: 600; fill: #222222; }
  </style>
<text x="60" y="64" class="title">ObjPart + MEMTIS 결합 모드 Overview</text><text x="60" y="98" class="subtitle">ObjPart는 allocation-time object placement를, MEMTIS는 runtime page migration을 담당하며, 선택된 category range에 대해서만 MEMTIS migration을 제한하는 보호 계층이 추가된다.</text><line x1="50" y1="560" x2="1870" y2="560" stroke="#7d8792" stroke-width="3" stroke-dasharray="10 8"/><text x="68" y="546" class="section" fill="#4e79a7">User Space</text><text x="68" y="594" class="section" fill="#2f5d7c">Kernel Space</text><defs><marker id="dark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#3e4752"/>
    </marker><marker id="obj" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#d48645"/>
    </marker><marker id="mem" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#4c78a8"/>
    </marker><marker id="prot" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#5f8f52"/>
    </marker><marker id="muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#7d8792"/>
    </marker></defs><rect x="80" y="150" width="260" height="120" rx="18" ry="18" fill="#f7f7f8" stroke="#3e4752" stroke-width="2.5"/><text x="210" y="192" text-anchor="middle" class="boxhead">Target Application</text><text x="210" y="222" text-anchor="middle" class="body">allocation 요청 / object access</text><text x="210" y="248" text-anchor="middle" class="small">예: Redis-YCSB, Ligra</text><rect x="390" y="130" width="360" height="170" rx="18" ry="18" fill="#fdf1e8" stroke="#d48645" stroke-width="3"/><text x="570" y="170" text-anchor="middle" class="boxhead">ObjPart Allocator / Placement</text><text x="570" y="202" text-anchor="middle" class="body">call stack / policy lookup</text><text x="570" y="228" text-anchor="middle" class="small">allocation-time decision</text><rect x="430" y="245" width="95" height="34" rx="17" ry="17" fill="#d9ecfb" stroke="#d48645" stroke-width="1.8"/><text x="477.5" y="267" text-anchor="middle" class="small">DRAM pin</text><rect x="535" y="245" width="95" height="34" rx="17" ry="17" fill="#ededed" stroke="#d48645" stroke-width="1.8"/><text x="582.5" y="267" text-anchor="middle" class="small">PMEM pin</text><rect x="640" y="245" width="95" height="34" rx="17" ry="17" fill="#f8e0cb" stroke="#d48645" stroke-width="1.8"/><text x="687.5" y="267" text-anchor="middle" class="small">dynamic pool</text><rect x="820" y="120" width="360" height="190" rx="18" ry="18" fill="#fbf7ef" stroke="#7a63a1" stroke-width="3"/><text x="1000" y="160" text-anchor="middle" class="boxhead">Object Semantic Groups</text><text x="1000" y="188" text-anchor="middle" class="small">dynamic pool 내부 object 의미 구분</text><rect x="840" y="218" width="145" height="34" rx="12" ry="12" fill="#ffffff" stroke="#7a63a1" stroke-width="1.6"/><text x="912.5" y="240" text-anchor="middle" class="small">late-burst</text><rect x="1015" y="218" width="145" height="34" rx="12" ry="12" fill="#ffffff" stroke="#7a63a1" stroke-width="1.6"/><text x="1087.5" y="240" text-anchor="middle" class="small">frozen</text><rect x="840" y="258" width="145" height="34" rx="12" ry="12" fill="#ffffff" stroke="#7a63a1" stroke-width="1.6"/><text x="912.5" y="280" text-anchor="middle" class="small">short</text><rect x="1015" y="258" width="145" height="34" rx="12" ry="12" fill="#ffffff" stroke="#7a63a1" stroke-width="1.6"/><text x="1087.5" y="280" text-anchor="middle" class="small">early-burst</text><text x="1000" y="300" text-anchor="middle" class="tiny">allocation decision과 별도로, 현재 실험은 semantic group을 다시 protection category로 묶어 사용</text><rect x="1230" y="105" width="500" height="220" rx="18" ry="18" fill="#eef7ea" stroke="#5f8f52" stroke-width="3"/><text x="1480" y="147" text-anchor="middle" class="boxhead">Protection Layer (exclude)</text><text x="1480" y="178" text-anchor="middle" class="body">selected category pages excluded from MEMTIS migration</text><text x="1480" y="205" text-anchor="middle" class="small">MEMTIS 전체를 끄는 것이 아니라 migration path만 잠시 막음</text><rect x="1260" y="228" width="210" height="74" rx="14" ry="14" fill="#ffffff" stroke="#5f8f52" stroke-width="1.8"/><text x="1365" y="254" text-anchor="middle" class="small">Static protection</text><text x="1365" y="279" text-anchor="middle" class="body">short · frozen</text><rect x="1490" y="228" width="210" height="74" rx="14" ry="14" fill="#ffffff" stroke="#5f8f52" stroke-width="1.8"/><text x="1595" y="254" text-anchor="middle" class="small">Dynamic protection</text><text x="1595" y="279" text-anchor="middle" class="body">EB · LB</text><text x="1480" y="314" text-anchor="middle" class="tiny">EB/LB는 runtime owner state에 따라 보호 구간이 변함 (현재 구현은 EB 우선)</text><line x1="340" y1="210" x2="390" y2="210" stroke="#d48645" stroke-width="3" marker-end="url(#obj)"/><line x1="750" y1="210" x2="820" y2="210" stroke="#d48645" stroke-width="3" marker-end="url(#obj)"/><line x1="1180" y1="210" x2="1230" y2="210" stroke="#5f8f52" stroke-width="3" marker-end="url(#prot)"/><rect x="1240" y="380" width="430" height="120" rx="18" ry="18" fill="#fffaf2" stroke="#d48645" stroke-width="2.4"/><text x="1455" y="418" text-anchor="middle" class="boxhead">Dynamic Owner State (EB first)</text><text x="1455" y="448" text-anchor="middle" class="body">ObjPart runtime이 현재 직접 관리 중인 region set 유지</text><text x="1455" y="476" text-anchor="middle" class="small">region bitmap / shared memory / delta update</text><rect x="1290" y="620" width="500" height="120" rx="18" ry="18" fill="#eef6fb" stroke="#4c78a8" stroke-width="3"/><text x="1540" y="662" text-anchor="middle" class="boxhead">Kernel Exclude Registry</text><text x="1540" y="692" text-anchor="middle" class="body">memory.objpart_exclude_ctl</text><text x="1540" y="718" text-anchor="middle" class="small">add / del / clear 로 현재 보호 구간 반영</text><rect x="730" y="620" width="500" height="240" rx="18" ry="18" fill="#eef5fb" stroke="#4c78a8" stroke-width="3"/><text x="980" y="662" text-anchor="middle" class="boxhead">MEMTIS Runtime Migration</text><text x="980" y="692" text-anchor="middle" class="body">page access → sampling → hotness → DRAM cap aware choice</text><rect x="760" y="730" width="130" height="60" rx="14" ry="14" fill="#ffffff" stroke="#4c78a8" stroke-width="1.8"/><text x="825" y="767" text-anchor="middle" class="small">Sampling</text><rect x="910" y="730" width="130" height="60" rx="14" ry="14" fill="#ffffff" stroke="#4c78a8" stroke-width="1.8"/><text x="975" y="767" text-anchor="middle" class="small">Hotness</text><rect x="1060" y="730" width="130" height="60" rx="14" ry="14" fill="#ffffff" stroke="#4c78a8" stroke-width="1.8"/><text x="1125" y="767" text-anchor="middle" class="small">Promote / Demote</text><text x="980" y="825" text-anchor="middle" class="small">non-excluded page에 대해서만 migration 수행</text><rect x="1360" y="790" width="380" height="180" rx="18" ry="18" fill="#f5f7f9" stroke="#3e4752" stroke-width="2.5"/><text x="1550" y="828" text-anchor="middle" class="boxhead">Tiered Memory</text><rect x="1400" y="850" width="300" height="42" rx="12" ry="12" fill="#d9ecfb" stroke="#7cb5ec" stroke-width="2"/><text x="1550" y="877" text-anchor="middle" class="body">DRAM (fast tier)</text><rect x="1400" y="910" width="300" height="42" rx="12" ry="12" fill="#ededed" stroke="#bdbdbd" stroke-width="2"/><text x="1550" y="937" text-anchor="middle" class="body">PMEM (slow tier)</text><rect x="480" y="355" width="560" height="150" rx="18" ry="18" fill="#fffaf2" stroke="#d48645" stroke-width="3"/><text x="760" y="396" text-anchor="middle" class="boxhead">Shared Owner State</text><text x="760" y="426" text-anchor="middle" class="body">ObjPart-owned current region set</text><text x="760" y="453" text-anchor="middle" class="small">region bitmap in shared memory</text><rect x="655" y="468" width="20" height="20" fill="#e7a97a" stroke="#d48645" stroke-width="1"/><rect x="675" y="468" width="20" height="20" fill="#ffffff" stroke="#d48645" stroke-width="1"/><rect x="695" y="468" width="20" height="20" fill="#e7a97a" stroke="#d48645" stroke-width="1"/><rect x="715" y="468" width="20" height="20" fill="#ffffff" stroke="#d48645" stroke-width="1"/><rect x="735" y="468" width="20" height="20" fill="#e7a97a" stroke="#d48645" stroke-width="1"/><rect x="755" y="468" width="20" height="20" fill="#ffffff" stroke="#d48645" stroke-width="1"/><rect x="655" y="488" width="20" height="20" fill="#e7a97a" stroke="#d48645" stroke-width="1"/><rect x="675" y="488" width="20" height="20" fill="#e7a97a" stroke="#d48645" stroke-width="1"/><rect x="695" y="488" width="20" height="20" fill="#ffffff" stroke="#d48645" stroke-width="1"/><rect x="715" y="488" width="20" height="20" fill="#ffffff" stroke="#d48645" stroke-width="1"/><rect x="735" y="488" width="20" height="20" fill="#e7a97a" stroke="#d48645" stroke-width="1"/><rect x="755" y="488" width="20" height="20" fill="#ffffff" stroke="#d48645" stroke-width="1"/><rect x="655" y="508" width="20" height="20" fill="#ffffff" stroke="#d48645" stroke-width="1"/><rect x="675" y="508" width="20" height="20" fill="#e7a97a" stroke="#d48645" stroke-width="1"/><rect x="695" y="508" width="20" height="20" fill="#ffffff" stroke="#d48645" stroke-width="1"/><rect x="715" y="508" width="20" height="20" fill="#e7a97a" stroke="#d48645" stroke-width="1"/><rect x="735" y="508" width="20" height="20" fill="#ffffff" stroke="#d48645" stroke-width="1"/><rect x="755" y="508" width="20" height="20" fill="#ffffff" stroke="#d48645" stroke-width="1"/><text x="876" y="505" text-anchor="start" class="tiny">1 = ObjPart-owned</text><text x="876" y="523" text-anchor="start" class="tiny">0 = MEMTIS-owned / unmanaged</text><rect x="560" y="600" width="340" height="120" rx="18" ry="18" fill="#ffffff" stroke="#d48645" stroke-width="3"/><text x="730" y="642" text-anchor="middle" class="boxhead">User Daemon / Sync Helper</text><text x="730" y="672" text-anchor="middle" class="body">이전 상태 vs 현재 상태 비교</text><text x="730" y="698" text-anchor="middle" class="small">changed ranges만 kernel에 반영</text><line x1="760" y1="505" x2="730" y2="600" stroke="#d48645" stroke-width="4" marker-end="url(#obj)"/><line x1="900" y1="660" x2="1290" y2="660" stroke="#5f8f52" stroke-width="4" marker-end="url(#prot)"/><text x="1080" y="642" class="label" fill="#5f8f52">delta update</text><text x="1075" y="666" class="small">full re-register가 아니라 changed ranges만 add/del</text><line x1="1290" y1="740" x2="1150" y2="790" stroke="#4c78a8" stroke-width="3" marker-end="url(#mem)"/><text x="1180" y="748" class="small">현재 보호 구간 전달</text><line x1="1230" y1="770" x2="1360" y2="850" stroke="#4c78a8" stroke-width="3" marker-end="url(#mem)"/><rect x="820" y="890" width="610" height="130" rx="18" ry="18" fill="#ffffff" stroke="#5f8f52" stroke-width="2.5"/><text x="1125" y="930" text-anchor="middle" class="boxhead">현재 결합 규칙의 의미</text><text x="1125" y="960" text-anchor="middle" class="body">ObjPart-owned 구간에서는 MEMTIS migration skip</text><text x="1125" y="988" text-anchor="middle" class="body">handoff 후에는 다시 MEMTIS migration 허용</text><line x1="1455" y1="325" x2="1455" y2="380" stroke="#d48645" stroke-width="3" marker-end="url(#obj)" stroke-dasharray="8 6"/><text x="1490" y="362" class="tiny">dynamic owner export</text><rect x="80" y="330" width="300" height="160" rx="18" ry="18" fill="#fafafa" stroke="#3e4752" stroke-width="1.8"/><text x="230" y="368" text-anchor="middle" class="boxhead">ObjPart가 하는 일</text><text x="106" y="400" class="small">• object 초기 placement 결정</text><text x="106" y="427" class="small">• pool / category metadata 유지</text><text x="106" y="454" class="small">• (현재 결합 실험에선) 선택된 range만 보호</text><text x="106" y="481" class="small">• user-space migration은 보통 제한적으로 사용</text><rect x="1700" y="365" width="170" height="130" rx="18" ry="18" fill="#fafafa" stroke="#3e4752" stroke-width="1.8"/><text x="1785" y="400" text-anchor="middle" class="boxhead">MEMTIS가 하는 일</text><text x="1715" y="430" class="tiny">• runtime page hotness 추정</text><text x="1715" y="450" class="tiny">• DRAM cap 아래 promote/demote</text><text x="1715" y="470" class="tiny">• excluded range는 migration만 skip</text><rect x="80" y="1010" width="1760" height="46" rx="14" ry="14" fill="#f4f7fb" stroke="#c8d5e3" stroke-width="1.6"/><text x="960" y="1039" text-anchor="middle" class="caption">핵심: ObjPart는 allocation-time object placement를, MEMTIS는 runtime page migration을 담당하며, 현재 결합 실험은 selected category range에 대해서만 MEMTIS migration을 제한한다.</text></svg>
