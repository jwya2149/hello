<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111; }
      .title { font-size: 34px; font-weight: 700; }
      .box { fill: #fff; stroke: #222; stroke-width: 4; rx: 20; ry: 20; }
      .pending { stroke-dasharray: 12 9; }
      .note { fill: #fff; stroke: #d3d3d3; stroke-width: 2; rx: 14; ry: 14; filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.12)); }
      .legend { fill: #fff; stroke: #222; stroke-width: 2; rx: 12; ry: 12; }
      .body { font-size: 22px; font-weight: 700; }
      .sub { font-size: 18px; }
      .small { font-size: 20px; }
      .bullet { font-size: 16px; }
      .arrow { stroke: #111; stroke-width: 6; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#111"/>
    </marker>
  </defs>

  <rect width="1400" height="820" fill="#faf9f5"/>
  <text x="40" y="72" class="title">LB category policy: PMEM-side ownership, activation, demotion, and reacquire</text>

  <rect x="250" y="110" width="400" height="78" class="box"/>
  <circle cx="305" cy="149" r="24" fill="#d07a3d"/>
  <text x="305" y="156" text-anchor="middle" fill="#fff" font-size="14">PMEM</text>
  <text x="450" y="146" text-anchor="middle" class="body">QUIESCENT_OWNED</text>
  <text x="450" y="172" text-anchor="middle" class="sub">소유 중 비활성 대기 / PMEM 측 위치</text>

  <rect x="250" y="265" width="370" height="110" class="box"/>
  <circle cx="305" cy="320" r="24" fill="#1a9df0"/>
  <text x="305" y="327" text-anchor="middle" fill="#fff" font-size="14">DRAM</text>
  <text x="435" y="312" text-anchor="middle" class="body">ACTIVE</text>
  <text x="435" y="340" text-anchor="middle" class="sub">활성화 윈도우 / DRAM 타깃 지정</text>

  <rect x="250" y="445" width="400" height="92" class="box pending"/>
  <circle cx="305" cy="491" r="24" fill="#1a9df0"/>
  <text x="305" y="498" text-anchor="middle" fill="#fff" font-size="14">DRAM</text>
  <text x="455" y="484" text-anchor="middle" class="body">DEMOTED_PENDING</text>
  <text x="455" y="512" text-anchor="middle" class="sub">강등 대기 중 / DRAM 지속 상주</text>

  <rect x="250" y="605" width="400" height="78" class="box"/>
  <circle cx="305" cy="644" r="24" fill="#d07a3d"/>
  <text x="305" y="651" text-anchor="middle" fill="#fff" font-size="14">PMEM</text>
  <text x="450" y="640" text-anchor="middle" class="body">RDM_OWNED</text>
  <text x="450" y="666" text-anchor="middle" class="sub">커널 위임 상태 / PMEM 위치 / 재활성화 대기</text>
  <text x="590" y="650" font-size="42" font-weight="700">↪</text>

  <path d="M 450 188 L 450 260" class="arrow"/>
  <text x="485" y="228" class="small">연속 접근 감지 + 쿨다운 통과</text>
  <text x="485" y="252" class="small">(+ 선택적으로 PMEM 읽기 확인)</text>

  <path d="M 435 378 L 435 442" class="arrow"/>
  <text x="475" y="418" class="small">활성화 기한(Deadline) 도달</text>

  <path d="M 450 540 L 450 602" class="arrow"/>
  <text x="490" y="580" class="small">강등 완료 및 커널 위임</text>

  <path d="M 250 320 C 145 320, 120 570, 245 644" class="arrow"/>
  <text x="38" y="438" class="small">위임 이후 반복적인 접근 감지</text>
  <text x="38" y="466" class="small">(재점유 및 승격)</text>

  <path d="M 650 492 C 770 492, 770 320, 624 320" class="arrow"/>
  <text x="785" y="395" class="small">위임 완료 전 재접근 발생</text>
  <text x="785" y="423" class="small">(강등 취소)</text>

  <rect x="915" y="105" width="435" height="118" class="note"/>
  <text x="940" y="148" class="body">Activation trigger</text>
  <text x="940" y="188" class="small">단일 샘플만으로는 승격하지 않고, 연속 접근과 쿨다운 조건을</text>
  <text x="940" y="216" class="small">함께 만족할 때만 ACTIVE로 올리는 보수적 정책</text>

  <rect x="915" y="280" width="435" height="130" class="note"/>
  <text x="940" y="323" class="body">Demotion deadline</text>
  <text x="940" y="363" class="small">ACTIVE는 영구 상태가 아니며, 접근 빈도가 낮아지면</text>
  <text x="940" y="391" class="small">정해진 deadline 뒤 다시 강등 및 handoff 대상으로 전환</text>

  <rect x="915" y="460" width="435" height="188" class="note"/>
  <text x="940" y="503" class="body">Kernel interaction</text>
  <text x="940" y="545" class="bullet">• QUIESCENT_OWNED / ACTIVE / DEMOTED_PENDING: 커널 migration 차단</text>
  <text x="940" y="573" class="bullet">• RDM_OWNED: 커널 자체 정책으로 복귀하지만 조건 충족 시 다시 개입 가능</text>
  <text x="940" y="601" class="bullet">• 현재 해석의 핵심: LB 문제는 handoff 부재보다 reacquire/churn에 가까움</text>

  <rect x="40" y="730" width="1320" height="56" class="legend"/>
  <circle cx="90" cy="758" r="18" fill="#1a9df0"/>
  <text x="120" y="765" class="small">DRAM 측 상주 및 타깃</text>
  <circle cx="360" cy="758" r="18" fill="#d07a3d"/>
  <text x="390" y="765" class="small">PMEM 측 상주</text>
  <rect x="610" y="740" width="54" height="36" fill="none" stroke="#111" stroke-width="3" stroke-dasharray="8 6" rx="10" ry="10"/>
  <text x="685" y="765" class="small">일시적 대기 및 전이 상태</text>
  <text x="980" y="765" font-size="38" font-weight="700">↪</text>
  <text x="1035" y="765" class="small">커널 tiering 시스템으로 위임 완료</text>
</svg>
