<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820">
  <defs>
    <style>
      .h { font: bold 24px sans-serif; fill: #111; }
      .t { font: 17px sans-serif; fill: #111; }
      .lbl { font: 14px sans-serif; fill: #333; }
      .b { fill: #fff; stroke: #333; stroke-width: 2; rx: 10; ry: 10; }
      .good { fill: #eef7ee; stroke: #2f7d32; stroke-width: 2; rx: 10; ry: 10; }
      .bad { fill: #fbefef; stroke: #a33; stroke-width: 2; rx: 10; ry: 10; }
      .open { fill: #fff7e8; stroke: #b07a00; stroke-width: 2; rx: 10; ry: 10; }
      .arrow { stroke: #666; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>

  <text x="30" y="40" class="h">Figure 5. Hypothesis-evidence map</text>

  <rect x="80" y="110" width="260" height="90" class="good"/>
  <text x="105" y="145" class="t">short bug existed</text>
  <text x="105" y="173" class="lbl">patched and regression recovered</text>

  <rect x="80" y="250" width="260" height="90" class="bad"/>
  <text x="105" y="285" class="t">LB classic ping-pong</text>
  <text x="105" y="313" class="lbl">weak in Ligra</text>

  <rect x="80" y="390" width="260" height="90" class="good"/>
  <text x="105" y="425" class="t">LB underfill</text>
  <text x="105" y="453" class="lbl">confirmed in Ligra</text>

  <rect x="80" y="530" width="260" height="90" class="bad"/>
  <text x="105" y="565" class="t">underfill alone explains it</text>
  <text x="105" y="593" class="lbl">weakened</text>

  <rect x="80" y="670" width="260" height="90" class="bad"/>
  <text x="105" y="705" class="t">mis-targeted active set</text>
  <text x="105" y="733" class="lbl">weakened by payoff rerun</text>

  <rect x="510" y="250" width="300" height="100" class="open"/>
  <text x="540" y="290" class="t">management overhead</text>
  <text x="540" y="318" class="lbl">current best guess in Ligra</text>

  <rect x="510" y="520" width="300" height="100" class="open"/>
  <text x="540" y="560" class="t">plateau-limited possibility</text>
  <text x="540" y="588" class="lbl">still open</text>

  <rect x="950" y="390" width="260" height="100" class="good"/>
  <text x="980" y="430" class="t">YCSB workload-dependent churn</text>
  <text x="980" y="458" class="lbl">supported</text>

  <line x1="340" y1="295" x2="510" y2="300" class="arrow"/>
  <line x1="340" y1="435" x2="510" y2="300" class="arrow"/>
  <line x1="340" y1="575" x2="510" y2="300" class="arrow"/>
  <line x1="340" y1="715" x2="510" y2="300" class="arrow"/>
  <line x1="810" y1="300" x2="950" y2="430" class="arrow"/>
  <line x1="810" y1="570" x2="950" y2="430" class="arrow"/>

  <text x="520" y="700" class="lbl">Takeaway:</text>
  <text x="610" y="700" class="lbl">many local LB hypotheses were tested;</text>
  <text x="610" y="725" class="lbl">the remaining open questions are now system-level:</text>
  <text x="610" y="750" class="lbl">plateau vs overhead vs combination value.</text>
</svg>
